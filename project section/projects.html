<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Featured Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #0f0f0f;
      --fg: #fafafa;
      --muted: #999;
      --border: #262626;
      --secondary: #1a1a1a;
      --primary: #f97316;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Section ── */
    .projects-section {
      position: relative;
      min-height: 300vh;
      padding: 6rem 1rem;
    }

    .sticky-wrapper {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 1.5rem; z-index: 10; }
    .header .label {
      font-size: 0.7rem;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--primary);
    }
    .header h2 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-top: 0.75rem;
    }

    /* ── Cards Container ── */
    .cards-container {
      position: relative;
      width: 100%;
      max-width: 64rem;
      height: 65vh;
      perspective: 2000px;
    }
    @media (min-width: 768px) { .cards-container { height: 60vh; } }

    /* ── Card Wrapper ── */
    .card-wrapper {
      position: absolute;
      inset: 0;
      margin: 0 0.5rem;
      will-change: transform, opacity;
      transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1),
                  opacity 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @media (min-width: 768px) { .card-wrapper { margin: 0; } }

    /* ── Card ── */
    .card {
      position: relative;
      height: 100%;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.06);
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(24px);
      transition: box-shadow 0.5s;
    }
    @media (min-width: 768px) { .card { border-radius: 1.5rem; } }
    .card.active { box-shadow: 0 25px 50px -12px var(--glow-color, rgba(249,115,22,0.35)); }

    /* ── Background Image ── */
    .card-bg { position: absolute; inset: 0; }
    .card-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 1s;
    }
    .card:hover .card-bg img { transform: scale(1.1); }
    .overlay-r { position: absolute; inset: 0; background: linear-gradient(to right, var(--bg), rgba(10,10,10,0.95), rgba(10,10,10,0.4)); }
    .overlay-t { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg), rgba(10,10,10,0.5), transparent); }
    .overlay-accent { position: absolute; inset: 0; opacity: 0.08; mix-blend-mode: overlay; }

    /* ── Glow ── */
    .card-glow {
      position: absolute;
      inset: -4px;
      border-radius: 1.5rem;
      opacity: 0;
      filter: blur(24px);
      transition: opacity 0.7s;
    }
    .card:hover .card-glow { opacity: 0.2; }

    /* ── Content ── */
    .card-content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 768px) { .card-content { flex-direction: row; } }

    .content-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.5rem;
    }
    @media (min-width: 768px) { .content-left { padding: 2.5rem; } }
    @media (min-width: 1024px) { .content-left { padding: 3.5rem; } }

    /* ── Badge Row ── */
    .badge-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .icon-badge {
      padding: 0.625rem;
      border-radius: 0.75rem;
      border: 1px solid currentColor;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-badge svg { width: 20px; height: 20px; }
    .category-tag {
      padding: 0.25rem 0.75rem;
      font-size: 0.7rem;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 9999px;
      border: 1px solid currentColor;
      backdrop-filter: blur(4px);
    }
    .project-counter { font-size: 0.7rem; color: var(--muted); font-family: monospace; }

    .card-title {
      font-size: clamp(1.5rem, 3vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    @media (min-width: 768px) { .card-desc { font-size: 1rem; } }

    /* ── Tech Tags ── */
    .tech-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tech-tag {
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      font-family: monospace;
      background: rgba(26,26,26,0.6);
      border-radius: 0.5rem;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
      transition: border-color 0.3s;
    }
    .tech-tag:hover { border-color: rgba(249,115,22,0.3); }
    .tech-more { padding: 0.375rem 0.75rem; font-size: 0.75rem; font-family: monospace; color: var(--muted); }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      font-family: inherit;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn-secondary {
      background: rgba(26,26,26,0.7);
      color: var(--fg);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }
    .btn-secondary:hover { border-color: rgba(249,115,22,0.5); background: var(--secondary); }
    .btn-primary { color: #fff; border: none; }
    .btn-primary:hover { box-shadow: 0 10px 25px rgba(249,115,22,0.3); }

    /* ── Big Number ── */
    .big-number {
      display: none;
      align-items: center;
      justify-content: center;
      padding-right: 2rem;
    }
    @media (min-width: 768px) { .big-number { display: flex; } }
    @media (min-width: 1024px) { .big-number { padding-right: 3.5rem; } }
    .big-number span {
      font-size: clamp(120px, 12vw, 180px);
      font-weight: 700;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.2;
      user-select: none;
      line-height: 1;
    }

    /* ── Progress Bar ── */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255,255,255,0.04);
    }
    .progress-fill { height: 100%; width: 0; transition: width 0.7s; }
    .card.active .progress-fill { width: 100%; }

    /* ── Navigation ── */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      z-index: 10;
    }
    .nav-btn {
      padding: 0.625rem;
      border-radius: 9999px;
      background: rgba(26,26,26,0.7);
      border: 1px solid var(--border);
      color: var(--fg);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
    }
    .nav-btn:hover { border-color: rgba(249,115,22,0.5); background: var(--secondary); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn svg { width: 20px; height: 20px; }

    .dots {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: rgba(26,26,26,0.5);
      backdrop-filter: blur(4px);
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .dot {
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      width: 12px; height: 12px;
      background: rgba(153,153,153,0.4);
      padding: 0;
    }
    .dot:hover { background: rgba(153,153,153,0.7); }
    .dot.active {
      width: 32px; height: 12px;
      background: var(--primary);
      box-shadow: 0 0 12px rgba(249,115,22,0.5);
    }

    /* ── Modal Overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 1rem;
      max-width: 56rem;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-hero { position: relative; height: 16rem; overflow: hidden; border-radius: 1rem 1rem 0 0; }
    @media (min-width: 768px) { .modal-hero { height: 20rem; } }
    .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
    .modal-hero .overlay-t { background: linear-gradient(to top, var(--card), rgba(15,15,15,0.5), transparent); }
    .modal-hero .overlay-accent { opacity: 0.1; }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem;
      border-radius: 9999px;
      background: rgba(10,10,10,0.8);
      border: 1px solid var(--border);
      color: var(--fg);
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.3s;
      display: flex;
    }
    .modal-close:hover { background: var(--bg); }
    .modal-close svg { width: 20px; height: 20px; }

    .modal-badge { position: absolute; bottom: 1rem; left: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }

    .modal-body { padding: 1.5rem; }
    @media (min-width: 768px) { .modal-body { padding: 2rem; } }
    .modal-body > * + * { margin-top: 1.5rem; }

    .modal-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    @media (min-width: 768px) { .modal-title { font-size: 1.875rem; } }
    .modal-full-desc { color: var(--muted); line-height: 1.6; margin-top: 0.5rem; }

    .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    @media (min-width: 768px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } }
    .metric-card { padding: 1rem; border-radius: 0.75rem; border: 1px solid; backdrop-filter: blur(4px); }
    .metric-value { font-size: 1.5rem; font-weight: 700; }
    .metric-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 0.25rem; }

    .info-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 768px) { .info-grid { grid-template-columns: 1fr 1fr; } }
    .info-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 0.75rem;
      background: rgba(26,26,26,0.5);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .info-item svg { width: 20px; height: 20px; color: var(--muted); flex-shrink: 0; }
    .info-label { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); }
    .info-value { font-size: 0.875rem; font-weight: 500; }

    .section-title {
      font-size: 0.75rem;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title svg { width: 16px; height: 16px; }

    .features-grid { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
    @media (min-width: 768px) { .features-grid { grid-template-columns: 1fr 1fr; } }
    .feature-item { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.875rem; }
    .feature-item svg { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; }
    .feature-item span { color: rgba(250,250,250,0.8); }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .modal-actions a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.75rem;
      text-decoration: none;
      transition: all 0.3s;
      font-family: inherit;
    }
    .modal-actions .action-secondary {
      background: rgba(26,26,26,0.7);
      color: var(--fg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .modal-actions .action-secondary:hover { border-color: rgba(249,115,22,0.5); background: var(--secondary); }
    .modal-actions .action-primary { color: #fff; border: none; }
    .modal-actions .action-primary:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
  </style>
</head>

function getCatIcon(cat) {
  if (cat === 'DL') return ICONS.cpu;
  if (cat === 'GenAI') return ICONS.sparkles;
  return ICONS.brain;
}

let activeIndex = 0;
const container = document.getElementById('cards-container');
const dotsEl = document.getElementById('dots-container');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const section = document.getElementById('projects-section');

// Build cards
projects.forEach((p, i) => {
  const a = ACCENTS[p.accent];
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.dataset.index = i;
  wrapper.innerHTML = `
    <div class="card" style="--glow-color:${a.glow}">
      <div class="card-bg">
        <img src="${p.image}" alt="${p.title}" loading="lazy" decoding="async" />
        <div class="overlay-r"></div>
        <div class="overlay-t"></div>
        <div class="overlay-accent" style="background:${a.grad}"></div>
      </div>
      <div class="card-glow" style="background:${a.grad}"></div>
      <div class="card-content">
        <div class="content-left">
          <div class="badge-row">
            <div class="icon-badge" style="background:${a.bg};color:${a.text};border-color:${a.border}">${getCatIcon(p.category)}</div>
            <span class="category-tag" style="background:${a.bg};color:${a.text};border-color:${a.border}">${p.category}</span>
            <span class="project-counter">0${p.id} / 0${projects.length}</span>
          </div>
          <h3 class="card-title">${p.title}</h3>
          <p class="card-desc">${p.description}</p>
          <div class="tech-tags">
            ${p.tech.slice(0,4).map(t=>`<span class="tech-tag">${t}</span>`).join('')}
            ${p.tech.length > 4 ? `<span class="tech-more">+${p.tech.length-4} more</span>` : ''}
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary view-details-btn" data-index="${i}">${ICONS.eye}<span>View Details</span></button>
            <a href="${p.demo}" class="btn btn-primary" style="background:${a.grad}" onclick="event.stopPropagation()">
              ${ICONS.play}<span>Live Demo</span>${ICONS.arrowUpRight}
            </a>
          </div>
        </div>
        <div class="big-number">
          <span style="background:${a.grad};-webkit-background-clip:text;background-clip:text">${String(p.id).padStart(2,'0')}</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="background:${a.grad}"></div></div>
    </div>
  `;
  container.appendChild(wrapper);
});

// Build dots
projects.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot';
  dot.dataset.index = i;
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function updateCards() {
  document.querySelectorAll('.card-wrapper').forEach((el, i) => {
    const offset = i - activeIndex;
    const zOff = offset * -100;
    const yOff = offset * 40;
    const scale = 1 - Math.abs(offset) * 0.1;
    const opacity = offset < 0 ? 0 : Math.max(0, 1 - Math.abs(offset) * 0.35);
    el.style.transform = `translateZ(${zOff}px) translateY(${yOff}px) scale(${scale})`;
    el.style.opacity = opacity;
    el.style.zIndex = projects.length - Math.abs(offset);
    el.style.pointerEvents = i === activeIndex ? 'auto' : 'none';
    const card = el.querySelector('.card');
    card.classList.toggle('active', i === activeIndex);
  });
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === activeIndex));
  prevBtn.disabled = activeIndex === 0;
  nextBtn.disabled = activeIndex === projects.length - 1;
}

function goTo(idx) {
  activeIndex = Math.max(0, Math.min(projects.length - 1, idx));
  updateCards();
}

prevBtn.addEventListener('click', () => goTo(activeIndex - 1));
nextBtn.addEventListener('click', () => goTo(activeIndex + 1));

// Scroll-driven
let ticking = false;
function onScroll() {
  if (ticking) return;
  ticking = true;
  requestAnimationFrame(() => {
    const rect = section.getBoundingClientRect();
    const scrollable = Math.max(1, section.offsetHeight - window.innerHeight);
    const scrolled = Math.max(0, -rect.top);
    const progress = Math.max(0, Math.min(1, scrolled / scrollable));
    const next = Math.min(projects.length - 1, Math.floor(progress * projects.length));
    if (next !== activeIndex) { activeIndex = next; updateCards(); }
    ticking = false;
  });
}
window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('resize', onScroll, { passive: true });

// View Details buttons
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.view-details-btn');
  if (btn) { e.stopPropagation(); openModal(projects[btn.dataset.index]); }
});

// Modal
const overlay = document.getElementById('modal-overlay');
const modalContent = document.getElementById('modal-content');

function openModal(p) {
  const a = ACCENTS[p.accent];
  modalContent.innerHTML = `
    <div class="modal-hero">
      <img src="${p.image}" alt="${p.title}" />
      <div class="overlay-t"></div>
      <div class="overlay-accent" style="background:${a.grad}"></div>
      <button class="modal-close" onclick="closeModal()">${ICONS.x}</button>
      <div class="modal-badge">
        <div class="icon-badge" style="background:${a.bg};color:${a.text};border-color:${a.border}">${getCatIcon(p.category)}</div>
        <span class="category-tag" style="background:${a.bg};color:${a.text};border-color:${a.border}">${p.category}</span>
      </div>
    </div>
    <div class="modal-body">
      <div>
        <h3 class="modal-title">${p.title}</h3>
        <p class="modal-full-desc">${p.fullDescription}</p>
      </div>
      <div class="metrics-grid">
        ${p.metrics.map(m => `<div class="metric-card" style="background:${a.bg};border-color:${a.border}"><p class="metric-value" style="color:${a.text}">${m.value}</p><p class="metric-label">${m.label}</p></div>`).join('')}
      </div>
      <div class="info-grid">
        <div class="info-item">${ICONS.calendar}<div><p class="info-label">Timeline</p><p class="info-value">${p.timeline}</p></div></div>
        <div class="info-item">${ICONS.users}<div><p class="info-label">Team</p><p class="info-value">${p.team}</p></div></div>
      </div>
      <div>
        <div class="section-title">${ICONS.target} Key Features</div>
        <div class="features-grid">
          ${p.features.map(f => `<div class="feature-item"><span style="color:${a.text}">${ICONS.check}</span><span>${f}</span></div>`).join('')}
        </div>
      </div>
      <div>
        <div class="section-title">Tech Stack</div>
        <div class="tech-tags">
          ${p.tech.map(t => `<span class="tech-tag" style="background:${a.bg};border-color:${a.border};color:${a.text}">${t}</span>`).join('')}
        </div>
      </div>
      <div class="modal-actions">
        <a href="${p.github}" target="_blank" class="action-secondary">${ICONS.github} View Source Code</a>
        <a href="${p.demo}" class="action-primary" style="background:${a.grad}">${ICONS.externalLink} Live Demo ${ICONS.arrowUpRight}</a>
      </div>
    </div>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// Init
updateCards();
onScroll();
</script>

</body>
